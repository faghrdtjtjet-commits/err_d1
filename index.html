<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Five Nights at Freddy's - FNaF 1</title>
    <style>
        @font-face {
            font-family: 'FNAFPixelOne';
            src: url('./Sprites/FNAFPixelOne-Regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #000; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'FNAFPixelOne', 'Courier New', monospace; }
        .game-container { position: relative; display: inline-block; }
        canvas { display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; touch-action: none; transform-origin: top left; }
        .game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 300; display: none; }
        .game-over h1 { color: #ff0000; font-size: 48px; margin-bottom: 20px; font-family: 'FNAFPixelOne', monospace; }
        .game-over p { color: #fff; font-size: 24px; margin-bottom: 30px; font-family: 'FNAFPixelOne', monospace; }
        .game-over button { padding: 10px 30px; font-size: 18px; background: #333; color: #fff; border: 2px solid #ff0000; cursor: pointer; font-family: 'FNAFPixelOne', monospace; }
        .game-over button:hover { background: #ff0000; }
        
        .night-info {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 100;
            font-family: 'FNAFPixelOne', monospace;
            display: none;
        }
        .night-info.visible { display: block; }
        
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; background: #000; padding: 20px; border-radius: 10px; z-index: 1000; border: 2px solid #0f0; text-align: center; font-family: 'FNAFPixelOne', monospace; }
        .loading.hide { display: none; }
        
        .reset-call-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #444;
            border: 1px solid #666;
            color: #fff;
            padding: 6px 12px;
            font-family: 'FNAFPixelOne', monospace;
            font-size: 11px;
            cursor: pointer;
            z-index: 150;
            border-radius: 3px;
            display: none;
        }
        .reset-call-btn.visible { display: block; }
        .reset-call-btn:hover { background: #555; border-color: #888; }
        
        .device-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 30px;
        }
        .device-btn {
            background: #222;
            border: 2px solid #0f0;
            color: #fff;
            padding: 20px 40px;
            font-size: 24px;
            font-family: 'FNAFPixelOne', monospace;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            text-align: center;
            min-width: 220px;
        }
        .device-btn.phone { font-size: 20px; }
        .device-btn:active { background: #0f0; color: #000; transform: scale(0.97); }
        .device-selector.hide { display: none; }
        
        .zoom-control {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #0f0;
            z-index: 200;
            display: flex;
            gap: 10px;
            align-items: center;
            pointer-events: auto;
        }
        .zoom-control.hide { display: none; }
        .zoom-control label { color: #fff; font-size: 11px; font-family: 'FNAFPixelOne', monospace; }
        .zoom-control input { width: 100px; cursor: pointer; accent-color: #0f0; }
        .zoom-control span { color: #fff; font-size: 10px; min-width: 40px; }
        
        .newspaper-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 400;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .newspaper-overlay.active { opacity: 1; pointer-events: auto; }
        .newspaper-image { max-width: 90%; max-height: 90%; object-fit: contain; cursor: pointer; }
        
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 450;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .video-overlay.active { opacity: 1; pointer-events: auto; }
        .video-overlay video { max-width: 100%; max-height: 100%; pointer-events: none; }
        
        .jumpscare-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }
        .jumpscare-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .final-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
        }
        .final-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .canvas-wrapper { position: relative; display: inline-block; transform-origin: top left; }
        
        .night-start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2500;
            flex-direction: column;
            font-family: 'FNAFPixelOne', monospace;
            pointer-events: none;
        }
        .night-start-screen.hide {
            display: none;
        }
        .night-start-text {
            color: #fff;
            font-size: 64px;
            text-align: center;
            letter-spacing: 4px;
        }
        .night-start-time {
            color: #fff;
            font-size: 36px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="loading" id="loading"><div>🎮 FNaF Recreation</div><div style="font-size:12px;margin-top:10px;">ЗАГРУЗКА...</div></div>
<div class="game-container" id="gameContainer" style="display: none;">
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
    </div>
    <div class="night-info" id="nightInfo">NIGHT 1 | 12:00 AM</div>
    <div class="reset-call-btn" id="resetCallBtn">СБРОСИТЬ ВЫЗОВ</div>
    <div class="game-over" id="gameOverScreen">
        <h1>⚠️ GAME OVER ⚠️</h1>
        <p id="gameOverText">YOU GOT CAUGHT!</p>
        <button id="restartBtn">RESTART NIGHT</button>
    </div>
</div>

<div class="device-selector" id="deviceSelector">
    <div class="device-btn" data-device="pc">💻 ПК</div>
    <div class="device-btn phone" data-device="phone">📱 ТЕЛЕФОН</div>
</div>

<div class="zoom-control" id="zoomControl">
    <label>🔍 МАСШТАБ:</label>
    <input type="range" id="zoomSlider" min="30" max="200" value="100" step="5">
    <span id="zoomValue">100%</span>
</div>

<script>
    // ==================== КОНФИГ МЕНЮ ====================
    const MENU_CONFIG = {
        textures: {
            game_title: "./Sprites/game_title.png",
            newgame_btn: "./Sprites/newgame_button.png",
            the_menu: "./Sprites/the_menu.png",
            intro: "./Sprites/intro.png",
            main_menu: "./Sprites/main_menu.png"
        },
        positions: {
            game_title: { x: 58, y: 63, w: 200, h: 200 },
            newgame_btn: { x: 55, y: 506, w: 300, h: 45 },
            the_menu: { x: 0, y: 0, w: 1280, h: 720 },
            intro: { x: 0, y: 0, w: 1280, h: 720 },
            main_menu: { x: 0, y: 0, w: 1280, h: 720 }
        },
        settings: {
            newspaper_duration: 5,
            auto_close: true
        }
    };
    
    // ==================== CANVAS ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvasWrapper');
    canvas.width = 1280;
    canvas.height = 720;
    
    // ==================== УСТРОЙСТВО ====================
    let isPhone = false;
    let currentZoom = 100;
    let newspaperActive = false;
    let isGameStarted = false;
    
    // ==================== МАСШТАБ ====================
    function updateZoom() {
        const scale = currentZoom / 100;
        canvasWrapper.style.transform = `scale(${scale})`;
        canvasWrapper.style.transformOrigin = 'top left';
        const container = document.querySelector('.game-container');
        container.style.width = `${1280 * scale}px`;
        container.style.height = `${720 * scale}px`;
        document.getElementById('zoomValue').innerText = currentZoom + '%';
    }
    function setZoom(value) { currentZoom = Math.min(200, Math.max(30, value)); updateZoom(); }
    
    // ==================== ПОЛНОЭКРАННЫЙ РЕЖИМ ====================
    function enterFullscreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
    }
    
    // ==================== МЕНЮ ====================
    let inMenu = true;
    let newspaperOverlay = null;
    let videoOverlay = null;
    let finalOverlay = null;
    let finalMusicPlaying = false;
    let finalTimer = null;
    
    // ==================== АУДИО ====================
    const AudioManager = {
        sounds: {},
        load(name, src, options = {}) {
            const audio = new Audio(src);
            audio.volume = options.volume ?? 1;
            audio.loop = options.loop ?? false;
            this.sounds[name] = audio;
        },
        play(name, restart = true) {
            const sound = this.sounds[name];
            if (!sound) return;
            if (restart) sound.currentTime = 0;
            sound.play().catch(e => console.warn(`Audio:`, e));
        },
        stop(name) {
            const sound = this.sounds[name];
            if (sound) { sound.pause(); sound.currentTime = 0; }
        },
        stopAll() { for (const key in this.sounds) this.stop(key); },
        isPlaying(name) {
            const sound = this.sounds[name];
            return sound && !sound.paused && sound.currentTime > 0;
        }
    };
    
    // ==================== ФИНАЛ ====================
    function showFinal() {
        if (finalOverlay) return;
        AudioManager.stopAll();
        AudioManager.play('winning_bells');
        finalMusicPlaying = true;
        finalOverlay = document.createElement('div');
        finalOverlay.className = 'final-overlay';
        const img = document.createElement('img');
        img.src = MENU_CONFIG.textures.main_menu;
        finalOverlay.appendChild(img);
        document.body.appendChild(finalOverlay);
        const checkMusicInterval = setInterval(() => {
            if (!AudioManager.isPlaying('winning_bells')) {
                clearInterval(checkMusicInterval);
                setTimeout(() => location.reload(), 500);
            }
        }, 500);
        finalTimer = setTimeout(() => { if (finalMusicPlaying) location.reload(); }, 12000);
    }
    
    // ==================== СКРИМЕР ====================
    function showJumpscare(animatronic, callback) {
        const overlay = document.createElement('div');
        overlay.className = 'jumpscare-overlay';
        const img = document.createElement('img');
        const jumpscarePaths = { bonnie: './Sprites/bon.png', chica: './Sprites/chik.png', foxy: './Sprites/fox.png', freddy: './Sprites/fred.png' };
        img.src = jumpscarePaths[animatronic];
        img.style.transform = 'scale(1.5)';
        overlay.appendChild(img);
        document.body.appendChild(overlay);
        overlay.addEventListener('click', () => { overlay.remove(); if (callback) callback(); });
        setTimeout(() => { if (document.body.contains(overlay)) { overlay.remove(); if (callback) callback(); } }, 3000);
    }
    
    // ==================== ВИДЕО 6 AM (НЕЛЬЗЯ ПРОПУСТИТЬ) ====================
    function showSixAmVideo(callback) {
        if (videoOverlay) return;
        
        AudioManager.stop('office_ambience');
        AudioManager.stop('mid_ambience');
        AudioManager.stop('powerdown');
        AudioManager.stop('freddy_is_here');
        AudioManager.stop('phone_call');
        
        videoOverlay = document.createElement('div');
        videoOverlay.className = 'video-overlay';
        const video = document.createElement('video');
        video.src = './Sprites/6am.mp4';
        video.autoplay = true;
        video.muted = false;
        video.loop = false;
        video.volume = 0.6;
        video.style.pointerEvents = 'none';
        
        videoOverlay.appendChild(video);
        document.getElementById('gameContainer').appendChild(videoOverlay);
        setTimeout(() => videoOverlay.classList.add('active'), 10);
        
        // Убираем возможность клика — видео нельзя пропустить
        videoOverlay.style.pointerEvents = 'none';
        
        const onEnded = () => {
            video.pause();
            videoOverlay.classList.remove('active');
            setTimeout(() => {
                videoOverlay.remove();
                videoOverlay = null;
                if (callback) callback();
            }, 300);
        };
        
        video.addEventListener('ended', onEnded);
        // НЕТ videoOverlay.addEventListener('click') — нельзя пропустить!
    }
    
    // ==================== ГАЗЕТА ====================
    function showNewspaperWithAnimation(callback) {
        if (newspaperOverlay) return;
        newspaperActive = true;
        newspaperOverlay = document.createElement('div');
        newspaperOverlay.className = 'newspaper-overlay';
        const img = document.createElement('img');
        img.className = 'newspaper-image';
        img.src = MENU_CONFIG.textures.intro;
        newspaperOverlay.appendChild(img);
        document.getElementById('gameContainer').appendChild(newspaperOverlay);
        setTimeout(() => newspaperOverlay.classList.add('active'), 10);
        const closeNewspaper = () => {
            newspaperOverlay.classList.remove('active');
            setTimeout(() => { newspaperOverlay.remove(); newspaperOverlay = null; newspaperActive = false; if (callback) callback(); }, 500);
        };
        img.addEventListener('click', closeNewspaper);
    }
    
    // ==================== ЭКРАН НАЧАЛА НОЧИ ====================
    function showNightStartScreen(nightNumber, callback) {
        const startScreen = document.createElement('div');
        startScreen.className = 'night-start-screen';
        
        const nightText = document.createElement('div');
        nightText.className = 'night-start-text';
        nightText.innerHTML = `NIGHT ${nightNumber}`;
        
        const timeText = document.createElement('div');
        timeText.className = 'night-start-time';
        timeText.innerHTML = `12:00 AM`;
        
        startScreen.appendChild(nightText);
        startScreen.appendChild(timeText);
        document.body.appendChild(startScreen);
        
        setTimeout(() => {
            startScreen.remove();
            if (callback) callback();
        }, 3000);
    }
    
    // ==================== ЗАГРУЗКА ИЗОБРАЖЕНИЙ ====================
    const images = {};
    let imagesLoaded = 0;
    let totalImages = 0;
    
    const gameTextures = {
        officeBg: './Sprites/room_office/office_place_fix.png',
        officePowerOut: './Sprites/room_office/game_over.png',
        officeFreddyHere: './Sprites/room_office/freddy_is_here.png',
        leftDoorLit: './Sprites/room_office/left_door_lit.png',
        rightDoorLit: './Sprites/room_office/right_door_lit.png',
        officeDoors: './Sprites/room_office/office_doors.png',
        leftDefault: './Sprites/office_buttons/left_side/left_button_default.png',
        leftBothOn: './Sprites/office_buttons/left_side/left_button_both_on.png',
        leftDoorOn: './Sprites/office_buttons/left_side/left_button_door_on.png',
        leftLightOn: './Sprites/office_buttons/left_side/left_button_light_on.png',
        rightDefault: './Sprites/office_buttons/right_side/right_button_default.png',
        rightBothOn: './Sprites/office_buttons/right_side/right_button_both_on.png',
        rightDoorOn: './Sprites/office_buttons/right_side/right_button_door_on.png',
        rightLightOn: './Sprites/office_buttons/right_side/right_button_light_on.png',
        cameraRedDot: './Sprites/camera_ui/camera_red_dot.png',
        cameraBorder: './Sprites/camera_ui/camera_border.png',
        cameraCams: './Sprites/camera_ui/camera_cams.png',
        cameraLift: './Sprites/camera_ui/camera_lift.png',
        cameraBarOffice: './Sprites/office_ui/camera_bar.png',
        cameraBarMenu: './Sprites/office_ui/camera_bar_unused.png',
        bonnie: './Sprites/bon.png',
        chica: './Sprites/chik.png',
        foxy: './Sprites/fox.png',
        freddy: './Sprites/fred.png',
        staticScreen: './Sprites/static_screen.png'
    };
    
    const menuTextures = {
        game_title: MENU_CONFIG.textures.game_title,
        newgame_btn: MENU_CONFIG.textures.newgame_btn,
        the_menu: MENU_CONFIG.textures.the_menu,
        intro: MENU_CONFIG.textures.intro,
        main_menu: MENU_CONFIG.textures.main_menu
    };
    
    const allTextures = { ...gameTextures, ...menuTextures };
    for (const [key, path] of Object.entries(allTextures)) {
        totalImages++;
        images[key] = new Image();
        images[key].onload = () => { imagesLoaded++; checkAllLoaded(); };
        images[key].onerror = () => { imagesLoaded++; checkAllLoaded(); };
        images[key].src = path;
    }
    
    const cameraImages = {};
    let cameraImagesLoaded = 0;
    let totalCameraImages = 0;
    const CAMERA_NAMES = ["Show Stage", "Backstage", "Dining Area", "East Hall", "East Hall Corner",
        "Pirates Cove", "Restrooms", "Supply Closet", "West Hall", "West Hall Corner"];
    const cameraBackgrounds = {
        "Show Stage": "./Sprites/rooms/show_stage/defined_show_stage.png",
        "Backstage": "./Sprites/rooms/backstage/defined_backstage.png",
        "Dining Area": "./Sprites/rooms/dining_area/defined_dining_area.png",
        "East Hall": "./Sprites/rooms/east_hall/defined_east_hall.png",
        "East Hall Corner": "./Sprites/rooms/east_hall/defined_east_hall_corner.png",
        "Pirates Cove": "./Sprites/rooms/pirates_cove/defined_pirates_cove.png",
        "Restrooms": "./Sprites/rooms/restrooms/defined_restrooms.png",
        "Supply Closet": "./Sprites/rooms/supply_closet/defined_supply_closet.png",
        "West Hall": "./Sprites/rooms/west_hall/defined_west_hall.png",
        "West Hall Corner": "./Sprites/rooms/west_hall/defined_west_hall_corner.png"
    };
    
    function loadCameraBackgrounds() {
        totalCameraImages = CAMERA_NAMES.length;
        for (const camera of CAMERA_NAMES) {
            const path = cameraBackgrounds[camera];
            const img = new Image();
            img.onload = () => { cameraImages[camera] = img; cameraImagesLoaded++; checkAllLoaded(); };
            img.onerror = () => { cameraImagesLoaded++; checkAllLoaded(); };
            img.src = path;
        }
    }
    
    function checkAllLoaded() {
        if (imagesLoaded === totalImages && cameraImagesLoaded === totalCameraImages) {
            document.getElementById('loading').classList.add('hide');
            document.getElementById('gameContainer').style.display = 'block';
        }
    }
    
    // ==================== МУЗЫКА В МЕНЮ ====================
    let menuMusicStarted = false;
    function startMenuMusic() {
        if (menuMusicStarted) return;
        AudioManager.load('menu_music', './SFX/FNAF1 sound/darkness music.wav', { loop: true, volume: 0.5 });
        AudioManager.play('menu_music');
        menuMusicStarted = true;
    }
    function stopMenuMusic() {
        if (AudioManager.isPlaying('menu_music')) AudioManager.stop('menu_music');
        menuMusicStarted = false;
    }
    
    // ==================== ЗВОНОК ====================
    let callTimeout = null;
    let callActive = false;
    function startPhoneCall(nightNumber) {
        stopPhoneCall();
        if (nightNumber >= 6) return;
        const callFile = `./SFX/voiceover${nightNumber}.wav`;
        AudioManager.load('phone_call', callFile, { volume: 0.7 });
        callTimeout = setTimeout(() => { AudioManager.play('phone_call'); callActive = true; updateCallButtonVisibility(); }, 500);
    }
    function stopPhoneCall() {
        if (callTimeout) { clearTimeout(callTimeout); callTimeout = null; }
        if (AudioManager.isPlaying('phone_call')) AudioManager.stop('phone_call');
        callActive = false;
        updateCallButtonVisibility();
    }
    function resetPhoneCall() { if (callActive || callTimeout) stopPhoneCall(); }
    function updateCallButtonVisibility() {
        const btn = document.getElementById('resetCallBtn');
        const isVisible = !inMenu && !newspaperActive && (callActive || callTimeout !== null);
        if (isVisible) btn.classList.add('visible');
        else btn.classList.remove('visible');
    }
    
    // ==================== СТАТИЧЕСКИЙ ЭФФЕКТ ====================
    let staticFrame = 0, staticTimer = 0;
    const STATIC_FRAME_COUNT = 8, STATIC_FRAME_WIDTH = 1280, STATIC_FRAME_HEIGHT = 720;
    let cameraStaticIntensity = 0.25, cameraStaticTimer = 0;
    function updateStaticEffect() { staticTimer++; if (staticTimer >= 4) { staticTimer = 0; staticFrame = (staticFrame + 1) % STATIC_FRAME_COUNT; } }
    function drawStaticOverlay(intensity) {
        if (!images.staticScreen || intensity <= 0) return;
        ctx.save();
        ctx.globalAlpha = intensity;
        const yOffset = staticFrame * STATIC_FRAME_HEIGHT;
        ctx.drawImage(images.staticScreen, 0, yOffset, STATIC_FRAME_WIDTH, STATIC_FRAME_HEIGHT, 0, 0, canvas.width, canvas.height);
        ctx.restore();
    }
    
    // ==================== КОМНАТЫ И АНИМАТРОНИКИ ====================
    let cameraRooms = CAMERA_NAMES.map(name => ({ name: name, panX: 0, panDir: 1, maxPan: 320 }));
    const minimapZones = [
        { name: "Show Stage", x: 920, y: 295, w: 70, h: 40 }, { name: "Dining Area", x: 900, y: 350, w: 70, h: 40 },
        { name: "Backstage", x: 795, y: 380, w: 70, h: 40 }, { name: "Pirates Cove", x: 870, y: 430, w: 70, h: 40 },
        { name: "Supply Closet", x: 835, y: 530, w: 70, h: 40 }, { name: "Restrooms", x: 1135, y: 380, w: 70, h: 40 },
        { name: "East Hall", x: 1025, y: 545, w: 70, h: 40 }, { name: "East Hall Corner", x: 1025, y: 585, w: 70, h: 40 },
        { name: "West Hall", x: 920, y: 545, w: 70, h: 40 }, { name: "West Hall Corner", x: 920, y: 585, w: 70, h: 40 }
    ];
    const cameraPositions = {
        "Show Stage": { bonnie: { x: 280, y: 150 }, chica: { x: 900, y: 150 }, freddy: { x: 590, y: 110 } },
        "Backstage": { bonnie: { x: 500, y: 180 }, freddy: { x: 750, y: 150 } },
        "Dining Area": { bonnie: { x: 400, y: 170 }, chica: { x: 850, y: 170 }, freddy: { x: 620, y: 130 } },
        "East Hall": { chica: { x: 600, y: 230 }, foxy: { x: 450, y: 230 }, freddy: { x: 750, y: 210 } },

    const moveMap = {

    function updateAnimatronics() {
        if (!gameRunning || powerOut || jumpscareTriggered) return;
        const now = Date.now();
        if (now - animatronicsLastUpdate < 1000) return;
        animatronicsLastUpdate = now;
        for (let [name, anim] of Object.entries(animatronics)) {
            if (!anim.active) continue;
            const chance = anim.aiLevel / 80;
            if (Math.random() > chance) continue;
            const moves = moveMap[name][anim.location];
            if (!moves || moves.length === 0) continue;
            const newLoc = moves[Math.floor(Math.random() * moves.length)];
            if (lastAnimLocation[name] !== newLoc && cameraOpen) {
                lastAnimLocation[name] = newLoc;
                cameraStaticIntensity = 0.75;
                cameraStaticTimer = Date.now();
            }
            const wasAtDoor = anim.atDoor;
            anim.location = newLoc;
            anim.atDoor = (anim.location === "Office Left" || anim.location === "Office Right");
            anim.side = anim.atDoor ? (anim.location === "Office Left" ? "LEFT" : "RIGHT") : null;
            if (anim.atDoor && !wasAtDoor) anim.doorArrivalTime = Date.now();
            if (!anim.atDoor && wasAtDoor) anim.doorArrivalTime = 0;
            if (name === "foxy") { if (anim.location !== "Pirates Cove") anim.runCounter = (anim.runCounter || 0) + 1; else anim.runCounter = 0; }
        }
    }
    
    function updateStaticIntensity() {
        if (cameraStaticTimer && Date.now() - cameraStaticTimer > 1000) { cameraStaticIntensity = 0.25; cameraStaticTimer = 0; }

    function checkDoorAttacks() {

        if (animatronics.chica.atDoor && animatronics.chica.side === "RIGHT" && !rightDoorClosed && now - animatronics.chica.doorArrivalTime >= 3000) triggerJumpscare("Chica");
        if (animatronics.foxy.atDoor && animatronics.foxy.side === "RIGHT" && !rightDoorClosed && animatronics.foxy.runCounter > 2 && now - animatronics.foxy.doorArrivalTime >= 3000) triggerJumpscare("Foxy");

    }

    function updateNight() {
        if (!nightStart || !gameRunning) return;
        const elapsed = (Date.now() - nightStart) / 1000;
        const newHour = Math.floor(elapsed / 30);
        if (newHour !== hourCount && newHour <= 6) {
            hourCount = newHour;
            currentHour = hourCount === 0 ? 12 : hourCount;
            const hour12 = currentHour % 12 || 12;
            const ampm = currentHour >= 12 ? "PM" : "AM";
            document.getElementById('nightInfo').innerHTML = `NIGHT ${nightNumber} | ${hour12}:00 ${ampm}`;
        }
        if (hourCount >= 6 && !jumpscareTriggered) {
            gameRunning = false;
            AudioManager.stop('office_ambience');
            AudioManager.stop('mid_ambience');
            AudioManager.stop('powerdown');
            AudioManager.stop('freddy_is_here');
            AudioManager.stop('phone_call');
            
            if (nightNumber === 5) {
                showFinal();
            } else {
                // ВИДЕО 6 AM — НЕЛЬЗЯ ПРОПУСТИТЬ
                showSixAmVideo(() => {
                    if (nightNumber < 6) startNight(nightNumber + 1);
                    else alert("🏆 YOU COMPLETED ALL NIGHTS! 🏆");
                });
            }
        }
    }
    
    function updatePower() {
        if (inMenu || newspaperActive || !isGameStarted) return;
        if (!gameRunning || powerOut) return;
        const now = Date.now();
        const dt = (now - lastPowerUpdate) / 1000;
        lastPowerUpdate = now;
        let usage = (leftDoor?1:0) + (rightDoor?1:0) + (leftLight?1:0) + (rightLight?1:0) + (cameraOpen?1:0);
        const usageLevel = Math.min(usage, 4);
        power = Math.max(0, power - drainRates[usageLevel] * dt);
        if (power <= 0 && !powerOutTriggered) {
            powerOutTriggered = true; powerOut = true;
            AudioManager.stop('office_ambience');
            AudioManager.stop('mid_ambience');
            AudioManager.play('powerdown');
            leftDoor = false; rightDoor = false; leftLight = false; rightLight = false; cameraOpen = false;
            if (lightHumPlaying) { AudioManager.stop('light_click'); lightHumPlaying = false; }
            setTimeout(() => {
                freddyActive = true; freddyBlinkTimer = Date.now();
                AudioManager.play('freddy_is_here');
                setTimeout(() => { roomDark = true; setTimeout(() => { if (gameRunning && powerOut) triggerJumpscare("Freddy"); }, 3000); }, 3000);
            }, 2000);
            stopPhoneCall();
        }
        if (freddyActive && !roomDark && Date.now() - freddyBlinkTimer > 400) { freddyBlink = !freddyBlink; freddyBlinkTimer = Date.now(); }
    }
    
    function updateCameraAnim() {
        if (cameraAnimDirection === 1 && cameraAnimFrame < 10) { cameraAnimFrame++; if (cameraAnimFrame === 10) cameraAnimDirection = 0; }
        else if (cameraAnimDirection === 2 && cameraAnimFrame > 0) { cameraAnimFrame--; if (cameraAnimFrame === 0) cameraAnimDirection = 0; }
        cameraOpen = (cameraAnimFrame > 0);
    }
    
    function updateDoorAnims() {
        if (leftDoorAnimDir === 1 && leftDoorAnim < 16) leftDoorAnim++;
        else if (leftDoorAnimDir === -1 && leftDoorAnim > 0) leftDoorAnim--;
        if (rightDoorAnimDir === 1 && rightDoorAnim < 16) rightDoorAnim++;
        else if (rightDoorAnimDir === -1 && rightDoorAnim > 0) rightDoorAnim--;
    }
    
    function updateCameraPan() {
        const room = cameraRooms[currentCam];
        room.panX += cameraPanSpeed * room.panDir;
        if (room.panX >= room.maxPan) { room.panX = room.maxPan; room.panDir = -1; }
        else if (room.panX <= 0) { room.panX = 0; room.panDir = 1; }
    }
    
    // ==================== МЕНЮ ====================
    function startMenu() {

        newspaperActive = false;

    function handleMenuClick(e) {
        if (!inMenu) return;
        let clientX, clientY;
        if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; e.preventDefault(); }
        else { clientX = e.clientX; clientY = e.clientY; }
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clickX = (clientX - rect.left) * scaleX;
        const clickY = (clientY - rect.top) * scaleY;
        const btnPos = MENU_CONFIG.positions.newgame_btn;
        if (clickX >= btnPos.x && clickX <= btnPos.x + btnPos.w && clickY >= btnPos.y && clickY <= btnPos.y + btnPos.h) {

                newspaperOverlay.classList.remove('active');

                    if (newspaperOverlay) newspaperOverlay.remove();

    // ==================== ОТРИСОВКА ИГРЫ ====================
    function drawGame() {
        if (!images.officeBg) return;
        let bgImg = images.officeBg;
        if (powerOut) {
            if (freddyActive && !roomDark) bgImg = freddyBlink ? images.officeFreddyHere : images.officePowerOut;
            else bgImg = images.officePowerOut;
        }
        const maxOffset = Math.max(0, bgImg.width - canvas.width);
        bgOffsetX = (mouseX / canvas.width) * maxOffset;
        ctx.drawImage(bgImg, bgOffsetX, 0, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
        
        if (leftLight && images.leftDoorLit) ctx.drawImage(images.leftDoorLit, bgOffsetX, 0, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
        if (rightLight && images.rightDoorLit) ctx.drawImage(images.rightDoorLit, bgOffsetX, 0, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
        
        if (images.officeDoors) {
            const doorW = 253, doorH = 720;
            const leftFrameX = leftDoorAnim * doorW, rightFrameX = rightDoorAnim * doorW;
            ctx.save(); ctx.scale(-1, 1);
            ctx.drawImage(images.officeDoors, leftFrameX, 0, doorW, doorH, -(0 - bgOffsetX + 280), 0, doorW, doorH);
            ctx.restore();
            ctx.drawImage(images.officeDoors, rightFrameX, 0, doorW, doorH, 1300 - bgOffsetX, 0, doorW, doorH);
        }
        
        let leftBtn = images.leftDefault;
        if (leftDoor && leftLight) leftBtn = images.leftBothOn;
        else if (leftDoor) leftBtn = images.leftDoorOn;
        else if (leftLight) leftBtn = images.leftLightOn;
        let rightBtn = images.rightDefault;
        if (rightDoor && rightLight) rightBtn = images.rightBothOn;
        else if (rightDoor) rightBtn = images.rightDoorOn;
        else if (rightLight) rightBtn = images.rightLightOn;
        if (leftBtn) ctx.drawImage(leftBtn, 1 - bgOffsetX, 250);
        if (rightBtn) ctx.drawImage(rightBtn, 1480 - bgOffsetX, 250);
        
        if (images.cameraBarOffice && !powerOut) ctx.drawImage(images.cameraBarOffice, 350, 640);
        
        if (cameraOpen || cameraAnimFrame > 0) {
            if (images.cameraLift) {
                const liftY = cameraAnimFrame * 72;
                ctx.drawImage(images.cameraLift, 0, liftY, canvas.width, 72, 0, 0, canvas.width, 72);
            }
            if (cameraAnimFrame === 10) {
                const room = cameraRooms[currentCam];
                updateCameraPan();
                const roomImg = cameraImages[room.name];
                if (roomImg && roomImg.complete) ctx.drawImage(roomImg, room.panX, 0, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
                
                const camPos = cameraPositions[room.name];
                if (camPos) {
                    for (let [name, anim] of Object.entries(animatronics)) {
                        if (anim.location === room.name && anim.active && images[anim.spriteKey]) {
                            const pos = camPos[name];
                            if (pos) {
                                const size = 400;
                                const adjustedX = pos.x - room.panX;
                                ctx.drawImage(images[anim.spriteKey], adjustedX, pos.y, size, size);
                            }
                        }
                    }
                }
                updateStaticEffect();
                drawStaticOverlay(cameraStaticIntensity);
                if (images.cameraBarMenu) ctx.drawImage(images.cameraBarMenu, 350, 640);
                if (images.cameraCams) ctx.drawImage(images.cameraCams, 800, 300);
                if (images.cameraRedDot) ctx.drawImage(images.cameraRedDot, 40, 40);
                if (images.cameraBorder) ctx.drawImage(images.cameraBorder, 0, 0);
                ctx.fillStyle = "#fff";
                ctx.font = "18px 'FNAFPixelOne', monospace";
                ctx.fillText(room.name, 20, 50);
            }
        }
        
        if (!powerOut) {
            ctx.fillStyle = "#fff";
            ctx.font = "20px 'FNAFPixelOne', monospace";
            ctx.fillText("POWER: " + Math.floor(power) + "%", 50, 638);
            
            let usage = (leftDoor?1:0) + (rightDoor?1:0) + (leftLight?1:0) + (rightLight?1:0) + (cameraOpen?1:0);
            usage = Math.min(usage, 4);
            const usageColor = usage > 3 ? "#f00" : usage > 2 ? "#ff0" : "#fff";
            ctx.fillStyle = usageColor;
            ctx.font = "14px 'FNAFPixelOne', monospace";

        const RIGHT_DOOR_X = 1300 - bgOffsetX;
        
        if (!leftDoor && leftLight) {
            if (animatronics.bonnie.atDoor && animatronics.bonnie.side === "LEFT" && images.bonnie) ctx.drawImage(images.bonnie, LEFT_DOOR_X, DOOR_Y, SPRITE_SIZE, SPRITE_SIZE);
            if (animatronics.freddy.atDoor && animatronics.freddy.side === "LEFT" && images.freddy) ctx.drawImage(images.freddy, LEFT_DOOR_X, DOOR_Y, SPRITE_SIZE, SPRITE_SIZE);
        }
        if (!rightDoor && rightLight) {
            if (animatronics.chica.atDoor && animatronics.chica.side === "RIGHT" && images.chica) ctx.drawImage(images.chica, RIGHT_DOOR_X, DOOR_Y, SPRITE_SIZE, SPRITE_SIZE);
            if (animatronics.foxy.atDoor && animatronics.foxy.side === "RIGHT" && images.foxy) ctx.drawImage(images.foxy, RIGHT_DOOR_X, DOOR_Y, SPRITE_SIZE, SPRITE_SIZE);
            if (animatronics.freddy.atDoor && animatronics.freddy.side === "RIGHT" && images.freddy) ctx.drawImage(images.freddy, RIGHT_DOOR_X, DOOR_Y, SPRITE_SIZE, SPRITE_SIZE);
        }
        if (roomDark) { ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height); }

    // ==================== КЛИКИ ====================
    const clickZones = {
        leftDoorBtn: { x: 1, y: 300, w: 75, h: 50 },
        leftLightBtn: { x: 1, y: 385, w: 75, h: 50 },
        rightDoorBtn: { x: 1204, y: 300, w: 75, h: 50 },
        rightLightBtn: { x: 1204, y: 385, w: 75, h: 50 },
        cameraBtn: { x: 350, y: 640, w: 600, h: 80 }
    };
    
    function handleGameClick(e) {
        if (inMenu) return;
        if (!gameRunning || powerOut) return;
        let clientX, clientY;
        if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; e.preventDefault(); }
        else { clientX = e.clientX; clientY = e.clientY; }
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clickX = (clientX - rect.left) * scaleX;
        let clickY = (clientY - rect.top) * scaleY;
        clickX = Math.min(Math.max(clickX, 0), canvas.width);
        clickY = Math.min(Math.max(clickY, 0), canvas.height);
        
        if (clickX >= clickZones.cameraBtn.x && clickX <= clickZones.cameraBtn.x + clickZones.cameraBtn.w && clickY >= clickZones.cameraBtn.y && clickY <= clickZones.cameraBtn.y + clickZones.cameraBtn.h && !powerOut) {
            if (cameraOpen && cameraAnimDirection === 0) { cameraAnimDirection = 2; AudioManager.play('camera_close'); }
            else if (!cameraOpen && cameraAnimDirection === 0) { cameraAnimDirection = 1; AudioManager.play('camera_open'); }
            return;
        }
        if (cameraOpen && cameraAnimFrame === 10) {
            for (let zone of minimapZones) {
                if (clickX >= zone.x && clickX <= zone.x + zone.w && clickY >= zone.y && clickY <= zone.y + zone.h) {
                    const idx = cameraRooms.findIndex(r => r.name === zone.name);
                    if (idx !== -1) { currentCam = idx; AudioManager.play('change_camera'); }
                    return;
                }
            }
            return;
        }
        if (!cameraOpen) {
            if (clickX >= clickZones.leftDoorBtn.x && clickX <= clickZones.leftDoorBtn.x + clickZones.leftDoorBtn.w && clickY >= clickZones.leftDoorBtn.y && clickY <= clickZones.leftDoorBtn.y + clickZones.leftDoorBtn.h) {
                leftDoor = !leftDoor; leftDoorAnimDir = leftDoor ? 1 : -1; AudioManager.play('door_open_close');
                leftDoorClosed = leftDoor;
                checkDoorAttacks(); return;
            }
            if (clickX >= clickZones.leftLightBtn.x && clickX <= clickZones.leftLightBtn.x + clickZones.leftLightBtn.w && clickY >= clickZones.leftLightBtn.y && clickY <= clickZones.leftLightBtn.y + clickZones.leftLightBtn.h) {
                const wasOff = !leftLight;
                leftLight = !leftLight;
                if (leftLight) rightLight = false;
                updateLightHum();
                if (leftLight && !leftLightSoundPlayed) {
                    const hasAnimAtLeftDoor = (animatronics.bonnie.atDoor && animatronics.bonnie.side === "LEFT") || (animatronics.freddy.atDoor && animatronics.freddy.side === "LEFT");
                    if (hasAnimAtLeftDoor) { AudioManager.play('windowscare'); leftLightSoundPlayed = true; }
                } else if (!leftLight) { leftLightSoundPlayed = false; }
                return;
            }
            if (clickX >= clickZones.rightDoorBtn.x && clickX <= clickZones.rightDoorBtn.x + clickZones.rightDoorBtn.w && clickY >= clickZones.rightDoorBtn.y && clickY <= clickZones.rightDoorBtn.y + clickZones.rightDoorBtn.h) {
                rightDoor = !rightDoor; rightDoorAnimDir = rightDoor ? 1 : -1; AudioManager.play('door_open_close');
                rightDoorClosed = rightDoor;
                checkDoorAttacks(); return;
            }
            if (clickX >= clickZones.rightLightBtn.x && clickX <= clickZones.rightLightBtn.x + clickZones.rightLightBtn.w && clickY >= clickZones.rightLightBtn.y && clickY <= clickZones.rightLightBtn.y + clickZones.rightLightBtn.h) {
                const wasOff = !rightLight;
                rightLight = !rightLight;
                if (rightLight) leftLight = false;
                updateLightHum();
                if (rightLight && !rightLightSoundPlayed) {
                    const hasAnimAtRightDoor = (animatronics.chica.atDoor && animatronics.chica.side === "RIGHT") || (animatronics.foxy.atDoor && animatronics.foxy.side === "RIGHT") || (animatronics.freddy.atDoor && animatronics.freddy.side === "RIGHT");
                    if (hasAnimAtRightDoor) { AudioManager.play('windowscare'); rightLightSoundPlayed = true; }
                } else if (!rightLight) { rightLightSoundPlayed = false; }
                return;
            }
        }
    }
    
    // ==================== ТЕЛЕФОН: ПАНОРАМИРОВАНИЕ ====================
    let touchStartMouseX = 640, touchStartX = 0;
    function handleTouchStart(e) { if (inMenu) return; if (isPhone) { const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const touchX = (e.touches[0].clientX - rect.left) * scaleX; touchStartX = touchX; touchStartMouseX = mouseX; e.preventDefault(); } }
    function handleTouchMove(e) { if (inMenu) return; if (isPhone) { const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const touchX = (e.touches[0].clientX - rect.left) * scaleX; const deltaX = touchX - touchStartX; let newMouseX = touchStartMouseX + deltaX; newMouseX = Math.min(Math.max(newMouseX, 0), canvas.width); mouseX = newMouseX; e.preventDefault(); } }
    function handleTouchEnd(e) { if (inMenu) return; if (isPhone) e.preventDefault(); }
    
    function handleCanvasClick(e) { if (inMenu) handleMenuClick(e); else handleGameClick(e); }
    
    // ==================== ВЫБОР УСТРОЙСТВА ====================
    function selectDevice(device) {
        isPhone = (device === 'phone');
        document.getElementById('deviceSelector').classList.add('hide');
        const zoomControl = document.getElementById('zoomControl');
        if (isPhone) { zoomControl.classList.remove('hide'); setZoom(100); }
        else { zoomControl.classList.add('hide'); setZoom(100); }
        canvas.removeEventListener('click', handleCanvasClick);
        canvas.removeEventListener('mousemove', handleMouseMove);
        canvas.removeEventListener('touchstart', handleTouchStart);
        canvas.removeEventListener('touchmove', handleTouchMove);
        canvas.removeEventListener('touchend', handleTouchEnd);
        if (isPhone) {
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            canvas.addEventListener('touchstart', handleCanvasClick);
            document.body.style.touchAction = 'none';
        } else {
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('mousemove', handleMouseMove);
        }
        enterFullscreen();
        startMenuMusic();
        startMenu();
        gameLoop();
    }
    
    function handleMouseMove(e) { if (!isPhone && !inMenu) { const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; mouseX = (e.clientX - rect.left) * scaleX; mouseX = Math.min(Math.max(mouseX, 0), canvas.width); } }
    
    const zoomSlider = document.getElementById('zoomSlider');
    zoomSlider.addEventListener('input', (e) => { setZoom(parseInt(e.target.value)); });
    document.querySelectorAll('.device-btn').forEach(btn => { btn.addEventListener('click', () => { selectDevice(btn.dataset.device); }); });
    
    function startGameLoop() {
        window.addEventListener('keydown', (e) => { if (!inMenu && cameraOpen && cameraAnimFrame === 10) { if (e.key === 'ArrowRight') currentCam = (currentCam + 1) % cameraRooms.length; if (e.key === 'ArrowLeft') currentCam = (currentCam - 1 + cameraRooms.length) % cameraRooms.length; } });
        document.getElementById('restartBtn').addEventListener('click', () => { if (!inMenu) startNight(nightNumber); });
        document.getElementById('resetCallBtn').addEventListener('click', () => { if (!inMenu && !newspaperActive && !powerOut && gameRunning && (callActive || callTimeout !== null)) resetPhoneCall(); });
    }
    
    function gameLoop() {
        if (!inMenu) {
            updateStaticIntensity();
            if (gameRunning && !jumpscareTriggered) {
                updateNight();
                updatePower();
                updateDoorAnims();
                updateCameraAnim();
                updateAnimatronics();
                checkDoorAttacks();
                leftDoorClosed = leftDoor;
                rightDoorClosed = rightDoor;
            }
            drawGame();
        } else { drawMenu(); }
        requestAnimationFrame(gameLoop);
    }
    
    // ==================== ЗАГРУЗКА ====================
    const soundsList = ['camera_close', 'camera_open', 'change_camera', 'door_open_close', 'powerdown', 'freddy_is_here', 'office_ambience', 'mid_game_ambience'];
    soundsList.forEach(s => AudioManager.load(s, `./SFX/${s}.wav`));
    AudioManager.load('jumpscare', './SFX/FNAF1 sound/XSCREAM.wav');
    for (let i = 1; i <= 5; i++) AudioManager.load(`voiceover${i}`, `./SFX/voiceover${i}.wav`, { volume: 0.7 });
    loadCameraBackgrounds();
    startGameLoop();
</script>
</body>
